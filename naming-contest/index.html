<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XYZ Survey</title>
  <style>
    /* GitHub-inspired dark theme with select enhancements */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #21262d 100%);
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      background: rgba(26, 31, 38, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 3rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      background: linear-gradient(90deg, #58a6ff, #f0f6fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
      font-weight: 500;
      color: #d2d8de;
    }
    input[type="text"], select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22;
      color: #f0f6fc;
      font-size: 1rem;
      transition: all 0.2s ease;
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
    }
    select option {
      background: #161b22;
      color: #f0f6fc;
    }
    select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .rank-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .rank-row {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 1rem;
      align-items: center;
    }
    .rank-number {
      font-weight: 700;
      color: #58a6ff;
      font-size: 1.2rem;
      text-align: center;
    }
    .rank-summary {
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      font-size: 0.95rem;
    }
    .error {
      color: #f85149;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(90deg, #238636, #2ea043);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 1.5rem;
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(35, 134, 54, 0.3);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    button:active { transform: translateY(0); }
    @media (max-width: 600px) {
      .container { padding: 2rem 1.5rem; }
      h1 { font-size: 1.5rem; }
      .rank-row { grid-template-columns: 50px 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>XYZ Survey</h1>
    <form id="surveyForm" action="https://formspree.io/f/xzdkdzqj" method="POST">
      <label for="voter_name">Your name</label>
      <input type="text" id="voter_name" name="voter_name" required>

      <label>Rank the options (#1 first, continue as desired)</label>
      <div class="rank-group" id="rankGroup">
        <!-- Populated by JS -->
      </div>
      <div id="errorMsg" class="error" style="display: none;"></div>
      <div id="summary" class="rank-summary" style="display: none;"></div>

      <button type="submit" id="submitBtn" disabled>Submit Rankings</button>
    </form>
  </div>

  <script>
    const options = [
      { id: 'toodaloo', label: 'Toodaloo' },
      { id: 'the_painted_pencil', label: 'The Painted Pencil' },
      { id: 'different_drum', label: 'Different Drum' },
      { id: 'livin_creative', label: 'LIVIN Creative' },
      { id: 'test_throwaway', label: 'TEST THROWAWAY' }
    ];

    const rankGroup = document.getElementById('rankGroup');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const summary = document.getElementById('summary');
    const selects = [];

    // Create select dropdowns
    function createSelects() {
      rankGroup.innerHTML = '';
      selects.length = 0;
      for (let rank = 1; rank <= options.length; rank++) {
        const row = document.createElement('div');
        row.className = 'rank-row';
        row.innerHTML = `
          <div class="rank-number">#${rank}</div>
          <select id="rank${rank}">
            <option value="">— Unranked —</option>
          </select>
        `;
        rankGroup.appendChild(row);
        const select = row.querySelector('select');
        selects.push(select);
        select.addEventListener('change', updateValidation);
      }
      updateOptions();
    }

    // Update available options and sequential enabling
    function updateOptions() {
      const selected = new Set();
      selects.forEach(s => {
        if (s.value) selected.add(s.value);
      });

      let prevFilled = true;
      selects.forEach((select, index) => {
        const rank = index + 1;
        const currentValue = select.value;

        // Clear options except the placeholder
        while (select.children.length > 1) {
          select.removeChild(select.lastChild);
        }

        // Rebuild options: include all options unless they’re already selected
        // and are *not* the current value (so we keep the current selection)
        options.forEach(opt => {
          if (!selected.has(opt.id) || opt.id === currentValue) {
            const option = document.createElement('option');
            option.value = opt.id;
            option.textContent = opt.label;
            select.appendChild(option);
          }
        });

        // Re‑select the current value if still available
        if (currentValue && select.querySelector(`option[value="${currentValue}"]`)) {
          select.value = currentValue;
        }

        // Enable only if previous rank filled (or first)
        if (rank === 1 || selects[rank - 2].value) {
          select.disabled = false;
          prevFilled = true;
        } else {
          select.disabled = true;
          select.value = '';
          prevFilled = false;
        }
      });
    }
    // Validation and summary
    function updateValidation() {
      updateOptions();
      
      // Enable submit if at least #1 is selected (allows partial)
      const hasFirstRank = selects[0].value;
      if (hasFirstRank) {
        errorMsg.style.display = 'none';
        updateSummary();
        submitBtn.disabled = false;
      } else {
        errorMsg.textContent = 'Select your #1 choice first.';
        errorMsg.style.display = 'block';
        summary.style.display = 'none';
        submitBtn.disabled = true;
      }
    }

    function updateSummary() {
      const ranking = {};
      const rankedOptions = [];
      selects.forEach((s, i) => {
        if (s.value) {
          ranking[s.value] = i + 1;
          rankedOptions.push(`#${i+1}: ${options.find(opt => opt.id === s.value).label}`);
        }
      });
      summary.innerHTML = `
        <strong>Your ranking so far:</strong><br>
        ${rankedOptions.join('<br>')}<br><br>
        <small>Continue ranking or submit now.</small>
      `;
      summary.style.display = 'block';
    }

    // Form submission
    document.getElementById('surveyForm').addEventListener('submit', (e) => {
      selects.forEach((select, index) => {
        if (select.value) {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = `rank_${select.value}`;
          input.value = index + 1;
          e.target.appendChild(input);
        }
      });
    });

    // Init
    createSelects();
    updateValidation();
  </script>
</body>
</html>
