<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIVIN Creative Contest Winner</title>
  <style>
  /* Base styles matching attached index.html tone: warm, personal, clean sans-serif */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #21262d 100%);
    height: 100vh;
    overflow: hidden;
    position: relative;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    text-align: center;
    position: relative;
    z-index: 10;
  }

  /* CTA Button */
  .reveal-btn {
    background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4d96ff);
    background-size: 300% 300%;
    border: none;
    padding: 20px 40px;
    font-size: 24px;
    font-weight: 700;
    color: white;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    position: relative;
    transition: all 0.3s ease;
    animation: sparkle 2s infinite, gradientShift 3s ease infinite;
  }

  .reveal-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
  }

  @keyframes sparkle {
    0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px rgba(255,107,107,0.6); }
    50% { box-shadow: 0 0 30px rgba(255,255,255,1), 0 0 60px rgba(255,217,61,0.8); }
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Winner reveal */
  .winner {
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.5s ease;
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(45deg, #ff6b6b, #ffd93d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }

  .winner.revealed {
    opacity: 1;
    transform: scale(1);
  }

  /* Thank you message */
  .thank-you {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s ease 1.5s;
    font-size: 20px;
    font-weight: 400;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.5;
  }

  .thank-you.shown {
    opacity: 1;
    transform: translateY(0);
  }
  .spotlight {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, transparent 70%);
    pointer-events: none;
    top: 25%;
    left: 33%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    z-index: 5;
  }

  .spotlight:nth-child(1) {
    animation: figure8-1 2s infinite linear;
    filter: blur(15px);
  }

  .spotlight:nth-child(2) {
    animation: figure8-2 2s infinite linear reverse;
    filter: blur(20px);
  }

  @keyframes figure8-1 {
    0% { transform: translate(-120%, -60%) rotate(0deg); }
    25% { transform: translate(120%, -60%) rotate(90deg); }
    50% { transform: translate(120%, 60%) rotate(180deg); }
    75% { transform: translate(-120%, 60%) rotate(270deg); }
    100% { transform: translate(-120%, -60%) rotate(360deg); }
  }

  @keyframes figure8-2 {
    0% { transform: translate(120%, -60%) rotate(0deg); }
    25% { transform: translate(-120%, -60%) rotate(-90deg); }
    50% { transform: translate(-120%, 60%) rotate(-180deg); }
    75% { transform: translate(120%, 60%) rotate(-270deg); }
    100% { transform: translate(120%, -60%) rotate(-360deg); }
  }

  @keyframes converge {
  0% { 
    transform: translate(-50%, -50%) scale(1); 
  }
  100% { 
    transform: translate(0, 0) scale(2) !important; 
  }
  }

  /* Spotlight converge on reveal */
  .spotlight.converge {
    animation: converge 1s ease forwards 0.5s;
  }

  @keyframes converge {
    0% { transform: translate(-50%, -50%) scale(1); }
    100% { transform: translate(-50%, -50%) scale(1.5); }
  }

  /* Button glow during anticipation */
  .reveal-btn.glowing {
    animation: intenseGlow 1s ease infinite alternate;
  }

  @keyframes intenseGlow {
    0% { box-shadow: 0 0 30px rgba(255,255,255,1), 0 0 60px rgba(255,107,107,1); }
    100% { box-shadow: 0 0 50px rgba(255,255,255,1.2), 0 0 100px rgba(255,217,61,1); }
  }

  /* Confetti */
  .confetti {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 20;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #ff6b6b;
    animation: confettiFall 3s ease-out forwards;
  }

  @keyframes confettiFall {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(100vh) rotate(720deg);
      opacity: 0;
    }
  }

  /* Hide button and show winner */
  .reveal-btn.hidden {
    opacity: 0;
    transform: scale(0.5);
    pointer-events: none;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .reveal-btn { font-size: 20px; padding: 16px 32px; }
    .winner { font-size: 36px; }
    .thank-you { font-size: 18px; padding: 0 20px; }
  }
  </style>
</head>
<body>
  <div class="spotlight" id="spotlight1"></div>
  <div class="spotlight" id="spotlight2"></div>
  
  <div class="container">
  <button class="reveal-btn" id="revealBtn">Reveal the Winner!</button>
  <div class="winner" id="winner">LIVIN Creative</div>
  <p class="thank-you" id="thankYou">
    Thank you to everyone who voted! We are so honored to have you at the start of our journey!
  </p>
  </div>

  <div class="confetti" id="confetti"></div>

  <script>
  const revealBtn = document.getElementById('revealBtn');
  const winner = document.getElementById('winner');
  const thankYou = document.getElementById('thankYou');
  const spotlight1 = document.getElementById('spotlight1');
  const spotlight2 = document.getElementById('spotlight2');
  const confetti = document.getElementById('confetti');

  revealBtn.addEventListener('click', () => {
    // Position spotlights to container center before converging
    spotlight1.style.left = '50%';
    spotlight2.style.left = '50%';
    
    // Step 1: Spotlights smoothly converge  
    setTimeout(() => {
      spotlight1.classList.asList.add('converge');
      spotlight2.classList.add('converge');
    }, 100);
    
    // Step 3: After 1.5s total, reveal winner + confetti
    setTimeout(() => {
      revealBtn.classList.add('hidden');
      winner.classList.add('revealed');
      createConfetti();
    }, 1500);

    // Step 4: Thank you appears after confetti (3s later)
    setTimeout(() => {
      thankYou.classList.add('shown');
    }, 2500);
  });

  function createConfetti() {
    for (let i = 0; i < 100; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.backgroundColor = `hsl(${Math.random() * 60 + 0}, 70%, 60%)`;
    piece.style.animationDelay = Math.random() * 0.3 + 's';
    piece.style.animationDuration = (Math.random() * 1 + 2) + 's';
    confetti.appendChild(piece);

    // Clean up after animation
    setTimeout(() => {
      piece.remove();
    }, 4000);
    }
  }
  </script>
</body>
</html>
